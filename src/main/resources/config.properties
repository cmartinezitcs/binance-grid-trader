# ============================================================
#   BINANCE GRID TRADER - Configuracion Principal
# ============================================================

# ------------------------------------------------------------
# CREDENCIALES API BINANCE
# Obtener en: https://www.binance.com/es/my/settings/api-management
# Para testnet: https://testnet.binance.vision/
# ------------------------------------------------------------
binance.api.key=TU_API_KEY_AQUI
binance.api.secret=TU_API_SECRET_AQUI

# true = usar testnet (recomendado para pruebas)
# false = mercado real (cuidado con dinero real)
binance.testnet=true

# ------------------------------------------------------------
# PAR DE TRADING
# Ejemplos: BTCUSDT, ETHUSDT, BNBUSDT, SOLUSDT
# ------------------------------------------------------------
grid.symbol=BTCUSDT

# ------------------------------------------------------------
# CONFIGURACION DE LA CUADRICULA
# ------------------------------------------------------------

# Numero de niveles en la cuadricula (4 - 50 recomendado)
grid.levels=10

# Capital total a invertir en moneda cotizada (USDT)
grid.investment.total=100

# Tipo de espaciado entre niveles:
#   ARITHMETIC = diferencia fija en precio (ej: $100 entre cada nivel)
#   GEOMETRIC  = porcentaje fijo entre niveles (ej: 1% entre cada nivel)
grid.spacing.type=GEOMETRIC

# Porcentaje de espaciado entre niveles (solo usado cuando dynamic.range=false)
# Con GEOMETRIC: 1.0 = 1% entre cada nivel
# Con ARITHMETIC: se calcula automaticamente desde el rango total
grid.spacing.percent=1.0

# ------------------------------------------------------------
# GESTION DE RANGO DINAMICA (ATR-Based)
# ATR = Average True Range, mide la volatilidad del mercado
# ------------------------------------------------------------

# true = ajustar el rango automaticamente segun volatilidad
# false = usar rangos fijos basados en spacing.percent
grid.dynamic.range.enabled=true

# Periodo ATR (numero de velas para calcular el ATR)
# Valores comunes: 7, 14, 21
grid.atr.period=14

# Intervalo de velas para el calculo del ATR
# Opciones: 1m, 5m, 15m, 30m, 1h, 4h, 1d
grid.atr.interval=1h

# Multiplicador del ATR para definir el rango de la cuadricula
# Rango = precio_actual +/- (ATR * multiplicador)
# Valores comunes: 1.5, 2.0, 3.0
# Mayor valor = cuadricula mas amplia, menos rebalanceos
grid.atr.multiplier=2.0

# Umbral de rebalanceo (0.0 - 1.0)
# 0.7 = rebalancear cuando precio supera el 70% del borde de la cuadricula
# Mayor valor = rebalanceos mas frecuentes
grid.rebalance.threshold=0.7

# ------------------------------------------------------------
# GESTION DE RIESGO
# ------------------------------------------------------------

# Stop Loss global (% de perdida sobre inversion total para detener el bot)
# 0 = desactivado
grid.stop.loss.percent=5.0

# Take Profit global (% de ganancia sobre inversion total para detener el bot)
# 0 = desactivado
grid.take.profit.percent=20.0

# Numero maximo de ordenes activas simultaneas
grid.max.active.orders=20

# ------------------------------------------------------------
# INTERVALOS DE OPERACION (segundos)
# ------------------------------------------------------------

# Cada cuantos segundos revisar si hay ordenes completadas
grid.order.check.interval=15

# Cada cuantos segundos actualizar el monitor en consola
grid.monitor.interval=10

# Cada cuantos segundos recalcular ATR y verificar rebalanceo
grid.range.check.interval=300

# Segundos de espera entre peticiones a la API (para evitar rate limits)
grid.api.rate.limit.delay=200

# ------------------------------------------------------------
# PERSISTENCIA DE ESTADO
# ------------------------------------------------------------

# Archivo donde se guarda el estado del grid (para recuperacion tras crash)
grid.state.file=grid-state.json

# ------------------------------------------------------------
# FILTRO DE TENDENCIA (Moving Average)
# Protege contra comprar en tendencias bajistas fuertes.
# En BAJISTA: se suspenden nuevas compras hasta que la tendencia cambie.
# En ALCISTA o LATERAL: operacion normal del grid.
# ------------------------------------------------------------

# true = activar el filtro de tendencia
grid.trend.filter.enabled=true

# Periodo de la MA rapida (senal de corto plazo)
# Recomendado: 25 (1h) o 50 (4h/1d)
grid.trend.filter.fast.period=50

# Periodo de la MA lenta (tendencia de fondo)
# Recomendado: 100 (1h) o 200 (4h/1d)
grid.trend.filter.slow.period=200

# Intervalo de velas para calcular las MAs
# Usar el mismo o mayor que grid.atr.interval
# Opciones: 1m, 5m, 15m, 30m, 1h, 4h, 1d
grid.trend.filter.interval=1h

# Cada cuantos segundos se recalcula la tendencia
# 300 = cada 5 min (recomendado para intervalo 1h)
grid.trend.filter.check.interval=300

# ------------------------------------------------------------
# COMPOUNDING AUTOMATICO
# Reinvierte las ganancias realizadas para aumentar el capital del grid.
# El capital efectivo crece con cada evento de compounding, lo que aumenta
# la cantidad comprada/vendida por nivel y amplifica las ganancias futuras.
# ------------------------------------------------------------

# true = activar el compounding automatico
grid.compounding.enabled=true

# Modo de disparo del compounding:
#   CYCLES     = compound cada N ciclos completados (buy->sell)
#   PNL_AMOUNT = compound cada vez que el PnL acumulado supere X USDT
grid.compounding.trigger=CYCLES

# Cuantos ciclos completados disparan un compound (solo con trigger=CYCLES)
# Recomendado: 5-10 para grids activos, 2-3 para grids lentos
grid.compounding.cycles.threshold=5

# USDT de ganancia que disparan un compound (solo con trigger=PNL_AMOUNT)
grid.compounding.pnl.threshold=10.0

# Que porcentaje del PnL nuevo se reinvierte (el resto queda como beneficio libre)
# 100 = reinvertir todo | 50 = reinvertir la mitad, retirar la otra mitad
grid.compounding.reinvest.percent=50.0

# ------------------------------------------------------------
# FILTRO DE ENTRADA RSI + BOLLINGER BANDS
# Evalua el momentum del mercado antes de iniciar compras o rebalanceos.
# RSI mide sobrecompra/sobreventa; BB%B indica posicion dentro de las bandas.
#
# Senal FAVORABLE  -> RSI < oversold  O  BB%B < threshold  (o ambos con require.both=true)
# Senal NEUTRO     -> condiciones intermedias, sin bloqueo
# Senal NO OPERAR  -> RSI > overbought  Y  BB%B > 0.85 (mercado extendido)
#
# Impacto: rebalanceos se difieren si la senal es NO OPERAR y se ejecutan
# en cuanto la senal mejora a FAVORABLE o NEUTRO.
# ------------------------------------------------------------

# true = activar el filtro de entrada RSI+BB
grid.entry.filter.enabled=true

# Intervalo de velas para calcular RSI y BB
# Opciones: 1m, 5m, 15m, 30m, 1h, 4h, 1d
grid.entry.filter.interval=1h

# Periodo del RSI (numero de velas)
# Valor estandar: 14
grid.entry.filter.rsi.period=14

# Umbral de sobreventa del RSI (senal de compra)
# Menor valor = mas restrictivo (solo compra en caidas fuertes)
grid.entry.filter.rsi.oversold=35.0

# Umbral de sobrecompra del RSI (senal de no operar)
grid.entry.filter.rsi.overbought=65.0

# Periodo de la Media Movil de las Bandas de Bollinger
grid.entry.filter.bb.period=20

# Multiplicador de desviacion estandar para las bandas
# 2.0 = bandas estandar (cubre ~95% de los precios)
grid.entry.filter.bb.std.dev=2.0

# Umbral de BB%B para senal FAVORABLE (0.0 - 1.0)
# 0.3 = precio en el tercio inferior de las bandas (zona de valor)
grid.entry.filter.bb.threshold=0.3

# true = requerir RSI < oversold Y BB%B < threshold (mas restrictivo)
# false = basta con UNO de los dos criterios (mas senales, menos filtro)
grid.entry.filter.require.both=false

# Cada cuantos segundos se recalcula el RSI y las BB
# 300 = cada 5 min (recomendado para intervalo 1h)
grid.entry.filter.check.interval=300

# ------------------------------------------------------------
# MODO DE OPERACION
# ------------------------------------------------------------

# true = solo simular ordenes, sin enviar a Binance (paper trading)
# false = operar en mercado real/testnet
grid.dry.run=false
